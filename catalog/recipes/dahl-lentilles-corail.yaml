  - ordre: 3
    texte: "Ajouter les tomates coupées en dés et les lentilles rincées, couvrir d'eau et laisser mijoter en remuant de temps en temps."
    lexicon_ids: []
    timer_s: 1200
    timer_type: cuisson
  - ordre: 4
    texte: "Saler, poivrer et servir bien chaud."
    lexicon_ids: []
    timer_s: null
    timer_type: null

