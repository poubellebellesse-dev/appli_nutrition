id: dahl_lentilles_corail
nom: "Dahl de lentilles corail"
description: >
  Un plat mijoté de lentilles corail et tomate, inspiré de la cuisine indienne,
  généreux et réconfortant.
temps_prep_min: 10
temps_cuisson_min: 25
difficulte: 2
portions_base: 4
image_path: null
