  - food_id: oignon
    quantite_g: 100
    unite_affichage: "1 oignon"
    optionnel: false
  - food_id: ail
    quantite_g: 10
    unite_affichage: "2 gousses"
    optionnel: false
  - food_id: tomate
    quantite_g: 300
    unite_affichage: "3 tomates"
    optionnel: false
  - food_id: huile_olive
    quantite_g: 20
    unite_affichage: "2 cuillères à soupe"
    optionnel: false
  - food_id: sel_fin
    quantite_g: 5
    unite_affichage: "au goût"
    optionnel: false
  - food_id: poivre_noir
    quantite_g: 1
    unite_affichage: "1 pincée"
    optionnel: true

etapes:
  - ordre: 1
    texte: "Émincer l'oignon et l'ail."
    lexicon_ids: [emincer]
    timer_s: null
    timer_type: null
  - ordre: 2
    texte: "Faire revenir l'oignon et l'ail dans l'huile d'olive."
