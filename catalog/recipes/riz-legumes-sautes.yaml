id: riz_legumes_sautes
nom: "Riz aux légumes sautés"
description: >
  Un riz coloré aux légumes de saison, sauté à la poêle, pour un repas complet
  qui change du quotidien.
temps_prep_min: 15
temps_cuisson_min: 20
difficulte: 2
portions_base: 4
image_path: null
types_repas: [dejeuner, diner]
saison_mois: []
envergure: quotidien
conservation_jours: 3
axes:
  sucre_sale: -0.5
  leger_consistant: 0.0
  chaud_froid: 0.6
  texture: croquant

ingredients:
  - food_id: riz_blanc
    quantite_g: 300
    unite_affichage: "300 g"
    optionnel: false
  - food_id: carotte
    quantite_g: 150
    unite_affichage: "2 carottes"
    optionnel: false
  - food_id: courgette
    quantite_g: 200
    unite_affichage: "1 courgette"
    optionnel: false
  - food_id: poivron_rouge
    quantite_g: 150
    unite_affichage: "1 poivron"
    optionnel: false
  - food_id: oignon
    quantite_g: 100
    unite_affichage: "1 oignon"
    optionnel: false
  - food_id: huile_olive
    quantite_g: 30
    unite_affichage: "3 cuillères à soupe"
    optionnel: false
  - food_id: sel_fin
    quantite_g: 4
    unite_affichage: "au goût"
    optionnel: false

etapes:
  - ordre: 1
    texte: "Cuire le riz dans une grande casserole d'eau bouillante salée selon le temps indiqué sur l'emballage, puis égoutter."
    lexicon_ids: []
    timer_s: 900
    timer_type: cuisson
  - ordre: 2
    texte: "Émincer l'oignon, la carotte, la courgette et le poivron en lamelles fines."
    lexicon_ids: [emincer]
    timer_s: null
    timer_type: null
  - ordre: 3
    texte: "Faire chauffer l'huile d'olive dans un wok ou une grande poêle et faire sauter les légumes émincés en remuant régulièrement."
    lexicon_ids: []
    timer_s: 600
    timer_type: cuisson
  - ordre: 4
    texte: "Ajouter le riz cuit dans la poêle, saler et mélanger deux minutes avant de servir."
    lexicon_ids: []
    timer_s: 120
    timer_type: cuisson

facettes:
  - facette: cuisine
    valeur: asiatique
  - facette: regime
    valeur: vegetarien
  - facette: style
    valeur: convivial
