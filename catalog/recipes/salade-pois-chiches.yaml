id: salade_pois_chiches
nom: "Salade de pois chiches, tomate et persil"
description: >
  Une salade fraîche et rassasiante à base de pois chiches, idéale pour un repas léger.
temps_prep_min: 15
temps_cuisson_min: 0
difficulte: 1
portions_base: 4
image_path: null
