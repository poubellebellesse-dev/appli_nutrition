# ============================================================================
# PROVISOIRE — sous-ensemble d'aliments pour amorcer la chaîne de build (P0).
#
# Il n'existe pas encore de table CIQUAL (ANSES) téléchargée dans ce dépôt.
# Les valeurs nutritionnelles ci-dessous sont des ordres de grandeur usuels
# (pour 100 g de partie comestible), PAS des valeurs vérifiées contre la
# table CIQUAL officielle. Les `code_ciqual` sont des identifiants
# provisoires (préfixe PROV-), pas de vrais codes CIQUAL.
#
# Le vrai import ira dans catalog/sources/ciqual/ (fichier ANSES en clair,
# licence ouverte — voir docs/ARCHITECTURE.md §8.1) et remplacera ce
# fichier ; le reste de la chaîne (build.mjs, schéma food/food_nutrient/
# food_allergen) n'aura pas à changer.
#
# Allergènes : parmi les 14 allergènes réglementaires UE (règlement
# 1169/2011 annexe II). Codes utilisés ici : gluten, crustaces, oeufs,
# poissons, arachides, soja, lait, fruits_a_coque, celeri, moutarde,
# sesame, sulfites, lupin, mollusques.
# certitude ∈ { contient, traces }
# ============================================================================

